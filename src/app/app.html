<main class="app-shell">
  <section class="boat-grid" aria-label="Rowerki">
    @for (boat of boats(); track boat.id) {
      <article
        class="boat-card"
        [class.is-active]="isActive(boat)"
        [attr.data-tone]="boat.tone"
        [style.--boat-accent]="boat.accent"
        [style.--boat-glow]="boat.glow"
      >
        <header class="boat-header">
          <h2>{{ boat.name }}</h2>
        </header>

        <div class="time-panel">
          <span class="timer">{{ formatDuration(elapsedMs(boat)) }}</span>
          <span class="start-time">Start {{ formatClock(boat.startedAt) }}</span>
        </div>

        <section class="payment-panel" aria-label="Wpłacono">
          <span>Wpłacono</span>
          <strong>{{ formatMoney(boat.paid) }}</strong>
          <div class="payment-add">
            <input
              inputmode="decimal"
              min="0"
              placeholder="+ kwota"
              type="number"
              [value]="paymentDrafts()[boat.id] ?? ''"
              (input)="updatePaymentDraft(boat.id, $event)"
              (keydown.enter)="addPayment(boat.id)"
            />
            <button type="button" aria-label="Dodaj wpłatę" (click)="addPayment(boat.id)">+</button>
          </div>
        </section>

        <footer class="boat-actions">
          <button
            class="primary-action"
            type="button"
            [disabled]="isActive(boat)"
            (click)="startBoat(boat.id)"
          >
            Start
          </button>
          <button
            class="arrive-action"
            type="button"
            [disabled]="!isActive(boat)"
            (click)="requestClear(boat.id)"
          >
            Przypłynął
          </button>
        </footer>
      </article>
    }
  </section>

  @if (clearCandidate(); as boat) {
    <div class="dialog-backdrop" role="presentation">
      <section
        aria-labelledby="clear-dialog-title"
        aria-modal="true"
        class="confirm-dialog"
        role="dialog"
        [style.--boat-accent]="boat.accent"
        [style.--boat-glow]="boat.glow"
      >
        <h2 id="clear-dialog-title">{{ boat.name }} przypłynął?</h2>
        <p>Po potwierdzeniu karta wróci do pustego stanu.</p>
        <div class="dialog-actions">
          <button type="button" class="secondary-action" (click)="clearCandidateId.set(null)">
            Anuluj
          </button>
          <button type="button" class="danger-action" (click)="confirmClear()">Przypłynął</button>
        </div>
      </section>
    </div>
  }
</main>
